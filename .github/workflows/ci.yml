name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        # @llui/mcp's playwright-e2e.test.ts is opt-in via LLUI_RUN_E2E
        # and skipped by default. It spawns a real Vite dev server +
        # Chromium browser — neither of which is available on CI without
        # a downloaded ~250 MB browser binary. The jsdom-based e2e.test.ts
        # already covers the MCP protocol logic at the same level of
        # detail; the browser test is a local-dev integration check.
        run: pnpm turbo test
