name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS actions into Node 24 now — their v4 majors run on Node 20 (deprecated).
# GitHub makes Node 24 the default 2026-06-16, after which this is a no-op.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Backstop against a hung step (e.g. a stalled Playwright CDN download —
    # observed once as a 3h+ runner-killed job). Bounds the whole job to a
    # sane window so a hang fails fast instead of burning CI minutes.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache Playwright's downloaded browser binaries keyed on the
      # playwright version in pnpm-lock.yaml. Keeps CI fast — the
      # chromium install is ~250 MB and takes ~30s cold.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # The CDN download occasionally stalls at 100% and hangs indefinitely
        # (observed: a job killed only by the 3h+ runner shutdown). Bound each
        # attempt with `timeout` and retry so a transient stall self-heals
        # instead of taking the whole run down. timeout-minutes is the backstop
        # in case the inner `timeout` itself wedges.
        timeout-minutes: 15
        run: |
          for attempt in 1 2 3; do
            if timeout 300 pnpm exec playwright install chromium --with-deps; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt stalled or failed; retrying…"
          done
          echo "::error::Playwright install failed after 3 attempts"
          exit 1

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        run: pnpm turbo test

      # Boot every built example in headless Chromium and fail on any
      # console.error / page error. Catches issue-#5-class bugs where
      # the bundle compiles cleanly but crashes on first paint
      # (missing __view, broken __prefixes, etc.) — the kind of fault
      # type-checks and unit tests can't surface.
      - name: Smoke-test example bundles
        run: pnpm smoke:examples
