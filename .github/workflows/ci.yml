name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        # LLUI_SKIP_E2E skips @llui/mcp's playwright-e2e.test.ts, which
        # spawns a real Vite dev server + Chromium browser. That requires
        # `playwright install chromium` to download the ~250 MB binary
        # and is flaky on CI's slower disks. The jsdom-based e2e.test.ts
        # already covers the MCP protocol logic at the same level of
        # detail; the browser test is a local-dev integration check.
        env:
          LLUI_SKIP_E2E: '1'
        run: pnpm turbo test
