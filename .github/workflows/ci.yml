name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS actions into Node 24 now — their v4 majors run on Node 20 (deprecated).
# GitHub makes Node 24 the default 2026-06-16, after which this is a no-op.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Turbo's background daemon and its telemetry flush both do I/O after a run
  # completes; in the CI container that post-run step hung turbo for 24 min
  # after every task had already finished (all log groups closed, but turbo
  # never returned). Disable both so turbo exits as soon as the tasks do.
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

jobs:
  verify:
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: Chromium + its OS deps are baked
    # in, so CI never touches cdn.playwright.dev — which was deterministically
    # hanging at 100% on the chromium download and taking the job down (a 3h+
    # runner-killed job, then every retry stalling at the same point). The tag
    # MUST match the playwright version in pnpm-lock.yaml (1.59.1) so the bundled
    # browser revision matches what `playwright` expects — bump both together.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      # tini as PID 1: reaps zombie children and forwards signals. Tests spawn
      # the llui-mcp CLI server; without an init the container leaves killed
      # children unreaped, which kept the last vitest process alive (a 24-min
      # stall until the job timeout). Pairs with the tests' SIGKILL teardown.
      options: --init
    # Backstop against any hung step so a hang fails fast instead of burning CI
    # minutes.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Persist turbo's local cache (`.turbo/cache`, turbo 2's default dir)
      # across runs so unchanged packages replay from cache instead of
      # rebuilding the world. Keyed on the lockfile + turbo.json so a dep or
      # pipeline change busts it; the commit sha makes each run save a fresh
      # entry, and restore-keys fall back to the newest compatible cache. The
      # key prefix is shared with deploy-docs.yml so both workflows reuse it.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo check

      - name: Lint
        run: pnpm turbo lint

      - name: Test
        # Run tests with pnpm's recursive runner, NOT `turbo test`. Under turbo,
        # this step reproducibly hung for 24 min after every task had finished
        # (all log groups closed) — turbo never returned, only inside the GH
        # container (it exits fine locally). Build already ran via turbo, so the
        # dist deps tests need are present; pnpm just executes each package's
        # `vitest run` directly and exits cleanly when they're done.
        #
        # --workspace-concurrency=2 caps to two package suites at once: each
        # vitest already forks ~ncpu workers, so running many suites in parallel
        # oversubscribes the 4-core runner ~10x and starves timer-sensitive
        # tests. Two at a time keeps load gentle (~2x).
        run: pnpm -r --workspace-concurrency=2 run test

      # Boot every built example in headless Chromium and fail on any
      # console.error / page error. Catches issue-#5-class bugs where
      # the bundle compiles cleanly but crashes on first paint
      # (missing __view, broken __prefixes, etc.) — the kind of fault
      # type-checks and unit tests can't surface. Uses the browser
      # pre-installed in the container image (PLAYWRIGHT_BROWSERS_PATH).
      - name: Smoke-test example bundles
        run: pnpm smoke:examples

  # Drift gate: the API reference and example pages under site/content are
  # GENERATED (see site/src/generate-*.ts) and committed. If a source change
  # (a JSDoc edit, a new export, a new package in the registry, an example
  # tweak) isn't accompanied by a regenerate, the committed pages silently go
  # stale. This job regenerates them and fails if the working tree changes —
  # forcing the generated output to be committed alongside its source.
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-

      # The generators read each package's built types, so build first (replays
      # from the shared turbo cache when unchanged).
      - name: Build packages
        run: pnpm turbo build --filter=!@llui/site

      - name: Regenerate site content
        run: pnpm --filter @llui/site run generate

      - name: Fail on drift in generated pages
        run: git diff --exit-code site/content/api site/content/examples
