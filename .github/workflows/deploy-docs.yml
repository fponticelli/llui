name: Deploy docs

# Deploy ONLY after CI succeeds on main. A `push`-triggered deploy runs
# independently of CI, so a red commit (e.g. an example bundle that crashes on
# boot — caught by CI's smoke step) would still redeploy llui.dev from a broken
# tree. `workflow_run` gates the deploy on the CI conclusion instead. The old
# per-path filter is dropped: it had already drifted (missing CHANGELOG.md, whose
# page is a symlink to the site), and the site build is cheap (~75s) with
# `cancel-in-progress` coalescing redundant runs — correctness over a stale filter.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt JS actions into Node 24 now — their v4 majors run on Node 20 (deprecated).
# GitHub makes Node 24 the default 2026-06-16, after which this is a no-op.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip when CI failed (or was cancelled) — never deploy from a red main. The
    # `workflow_dispatch` path has no triggering run, so allow it through too.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the default branch by default; pin to the exact
          # commit CI validated so the deploy matches what passed.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Reuse the same turbo cache as ci.yml (shared key prefix) so the docs
      # deploy replays package builds instead of recompiling from scratch.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
            turbo-${{ runner.os }}-

      - name: Build LLui packages
        # @llui/dom, vite-plugin, vike power the site; components/effects/router/agent
        # are needed to build the example mini-apps (transitive deps via ^build).
        # markdown + markdown-editor back the two markdown examples (markdown-editor
        # pulls @llui/lexical + @llui/dom via ^build).
        run: >-
          pnpm turbo build
          --filter=@llui/dom
          --filter=@llui/vite-plugin
          --filter=@llui/vike
          --filter=@llui/components
          --filter=@llui/effects
          --filter=@llui/router
          --filter=@llui/agent
          --filter=@llui/markdown
          --filter=@llui/markdown-editor

      - name: Generate benchmarks + API docs + LLM files + example pages
        run: cd site && npx tsx src/generate-benchmarks.ts && npx tsx src/generate-api.ts && npx tsx src/generate-llms.ts && npx tsx src/generate-examples.ts

      - name: Build site
        run: cd site && npx vite build

      - name: Build + bundle example apps
        run: cd site && npx tsx src/build-examples.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
