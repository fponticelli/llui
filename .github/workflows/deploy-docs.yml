name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/*/README.md'
      - 'packages/*/src/**'
      - 'evaluation/prompts/system-prompt.md'
      - 'benchmarks/jfb-baseline.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt JS actions into Node 24 now — their v4 majors run on Node 20 (deprecated).
# GitHub makes Node 24 the default 2026-06-16, after which this is a no-op.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build LLui packages
        # @llui/dom, vite-plugin, vike power the site; components/effects/router/agent
        # are needed to build the example mini-apps (transitive deps via ^build).
        # markdown + markdown-editor back the two markdown examples (markdown-editor
        # pulls @llui/lexical + @llui/dom via ^build).
        run: >-
          pnpm turbo build
          --filter=@llui/dom
          --filter=@llui/vite-plugin
          --filter=@llui/vike
          --filter=@llui/components
          --filter=@llui/effects
          --filter=@llui/router
          --filter=@llui/agent
          --filter=@llui/markdown
          --filter=@llui/markdown-editor

      - name: Generate benchmarks + API docs + LLM files + example pages
        run: cd site && npx tsx src/generate-benchmarks.ts && npx tsx src/generate-api.ts && npx tsx src/generate-llms.ts && npx tsx src/generate-examples.ts

      - name: Build site
        run: cd site && npx vite build

      - name: Build + bundle example apps
        run: cd site && npx tsx src/build-examples.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
