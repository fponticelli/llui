<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLui Components Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Positioning + layout — plain CSS so we don't depend on Tailwind's
         @apply with attribute selectors (which the CDN doesn't process). */

      /* Switch */
      [data-scope='switch'][data-part='root'] {
        background: transparent;
        border: 0;
        padding: 0;
        cursor: pointer;
      }
      [data-scope='switch'][data-part='track'] {
        position: relative;
        display: inline-flex;
        height: 1.5rem;
        width: 2.75rem;
        border-radius: 9999px;
        background: rgb(203 213 225);
        transition: background-color 150ms;
      }
      [data-scope='switch'][data-part='track'][data-state='checked'] {
        background: rgb(37 99 235);
      }
      [data-scope='switch'][data-part='thumb'] {
        position: absolute;
        top: 2px;
        left: 2px;
        height: 1.25rem;
        width: 1.25rem;
        border-radius: 9999px;
        background: white;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.1);
        transition: transform 150ms;
      }
      [data-scope='switch'][data-part='thumb'][data-state='checked'] {
        transform: translateX(1.25rem);
      }

      /* Progress */
      [data-scope='progress'][data-part='track'] {
        position: relative;
        height: 0.5rem;
        width: 100%;
        overflow: hidden;
        border-radius: 9999px;
        background: rgb(226 232 240);
      }
      [data-scope='progress'][data-part='range'] {
        height: 100%;
        border-radius: 9999px;
        background: rgb(37 99 235);
        transition: width 300ms;
      }
      [data-scope='progress'][data-part='range'][data-state='indeterminate'] {
        width: 33% !important;
        animation: indeterminate 1.5s infinite ease-in-out;
      }
      @keyframes indeterminate {
        0% {
          margin-left: -33%;
        }
        100% {
          margin-left: 100%;
        }
      }

      /* Slider */
      [data-scope='slider'][data-part='control'] {
        position: relative;
        height: 1.5rem;
        width: 100%;
        cursor: pointer;
        touch-action: none;
      }
      [data-scope='slider'][data-part='track'] {
        position: absolute;
        top: 50%;
        height: 0.375rem;
        width: 100%;
        transform: translateY(-50%);
        border-radius: 9999px;
        background: rgb(226 232 240);
      }
      [data-scope='slider'][data-part='range'] {
        height: 100%;
        border-radius: 9999px;
        background: rgb(37 99 235);
      }
      [data-scope='slider'][data-part='thumb'] {
        top: 50% !important;
        height: 1rem;
        width: 1rem;
        border-radius: 9999px;
        border: 2px solid rgb(37 99 235);
        background: white;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.15);
        transform: translate(-50%, -50%) !important;
      }
      [data-scope='slider'][data-part='thumb']:focus {
        outline: 2px solid rgb(59 130 246);
        outline-offset: 2px;
      }

      /* Tabs */
      [data-scope='tabs'][data-part='list'] {
        display: flex;
        gap: 0.5rem;
        border-bottom: 1px solid rgb(226 232 240);
      }
      [data-scope='tabs'][data-part='trigger'] {
        margin-bottom: -1px;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: rgb(71 85 105);
        cursor: pointer;
        transition: color 150ms;
      }
      [data-scope='tabs'][data-part='trigger']:hover {
        color: rgb(15 23 42);
      }
      [data-scope='tabs'][data-part='trigger'][data-state='active'] {
        border-bottom-color: rgb(37 99 235);
        color: rgb(37 99 235);
      }

      /* Accordion */
      [data-scope='accordion'][data-part='item'] {
        border-bottom: 1px solid rgb(226 232 240);
      }
      [data-scope='accordion'][data-part='trigger'] {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0;
        border: 0;
        background: transparent;
        text-align: left;
        font-weight: 500;
        cursor: pointer;
        transition: color 150ms;
      }
      [data-scope='accordion'][data-part='trigger']:hover {
        color: rgb(37 99 235);
      }
      [data-scope='accordion'][data-part='content'] {
        padding-bottom: 0.75rem;
        font-size: 0.875rem;
        color: rgb(71 85 105);
      }

      /* Dialog + confirm-dialog — portaled to body */
      [data-scope='dialog'][data-part='positioner'] {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgb(15 23 42 / 0.4);
      }
      [data-scope='dialog'][data-part='content'],
      .confirm-dialog {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 28rem;
        border-radius: 0.5rem;
        background: white;
        padding: 1.5rem;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      }
      [data-scope='dialog'][data-part='title'] {
        font-size: 1.125rem;
        font-weight: 600;
      }
      [data-scope='dialog'][data-part='description'] {
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: rgb(71 85 105);
      }
      .confirm-dialog__actions {
        margin-top: 1.5rem;
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      /* Popover + menu (floating, portaled to body) */
      [data-scope='popover'][data-part='content'],
      [data-scope='menu'][data-part='content'] {
        min-width: 12rem;
        border-radius: 0.375rem;
        border: 1px solid rgb(226 232 240);
        background: white;
        padding: 0.5rem;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        outline: none;
      }
      [data-scope='menu'][data-part='item'] {
        cursor: pointer;
        border-radius: 0.25rem;
        padding: 0.375rem 0.5rem;
        font-size: 0.875rem;
      }
      [data-scope='menu'][data-part='item']:hover {
        background: rgb(241 245 249);
      }
      [data-scope='menu'][data-part='item'][data-state='highlighted'] {
        background: rgb(219 234 254);
        color: rgb(30 58 138);
      }

      /* Select */
      [data-scope='select'][data-part='trigger'] {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        border-radius: 0.375rem;
        border: 1px solid rgb(203 213 225);
        background: white;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        cursor: pointer;
      }
      [data-scope='select'][data-part='trigger']:focus {
        outline: 2px solid rgb(59 130 246);
        outline-offset: 2px;
      }
      [data-scope='select'][data-part='content'] {
        max-height: 15rem;
        min-width: 8rem;
        overflow: auto;
        border-radius: 0.375rem;
        border: 1px solid rgb(226 232 240);
        background: white;
        padding: 0.25rem;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        outline: none;
      }
      [data-scope='select'][data-part='item'] {
        cursor: pointer;
        border-radius: 0.25rem;
        padding: 0.375rem 0.5rem;
        font-size: 0.875rem;
      }
      [data-scope='select'][data-part='item'][data-highlighted=''] {
        background: rgb(219 234 254);
        color: rgb(30 58 138);
      }
      [data-scope='select'][data-part='item'][data-state='selected'] {
        font-weight: 500;
      }

      /* Toast (fixed region, bottom-right) */
      [data-scope='toast'][data-part='region'] {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 50;
        display: flex;
        width: 20rem;
        flex-direction: column;
        gap: 0.5rem;
      }
      [data-scope='toast'][data-part='root'] {
        border-radius: 0.5rem;
        background: white;
        padding: 1rem;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        border: 1px solid rgb(226 232 240);
      }
      [data-scope='toast'][data-part='root'][data-type='success'] {
        background: rgb(240 253 244);
        border-color: rgb(187 247 208);
      }
      [data-scope='toast'][data-part='root'][data-type='error'] {
        background: rgb(254 242 242);
        border-color: rgb(254 202 202);
      }
      [data-scope='toast'][data-part='title'] {
        font-size: 0.875rem;
        font-weight: 500;
      }
      [data-scope='toast'][data-part='description'] {
        font-size: 0.75rem;
        color: rgb(71 85 105);
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border: 0;
        transition: background-color 150ms;
      }
      .btn-primary {
        background: rgb(37 99 235);
        color: white;
      }
      .btn-primary:hover {
        background: rgb(29 78 216);
      }
      .btn-secondary {
        border: 1px solid rgb(203 213 225);
        background: white;
        color: rgb(15 23 42);
      }
      .btn-secondary:hover {
        background: rgb(248 250 252);
      }
      .btn-danger {
        background: rgb(220 38 38);
        color: white;
      }
      .btn-danger:hover {
        background: rgb(185 28 28);
      }
      .btn.text-xs {
        font-size: 0.75rem;
        padding: 0.375rem 0.75rem;
      }

      /* Sections */
      .demo-section {
        border-radius: 0.5rem;
        border: 1px solid rgb(226 232 240);
        background: white;
        padding: 1.5rem;
      }
      .demo-title {
        margin-bottom: 1rem;
        font-size: 1.125rem;
        font-weight: 600;
        color: rgb(15 23 42);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="app" class="mx-auto max-w-5xl p-6"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
