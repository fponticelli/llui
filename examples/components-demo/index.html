<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLui Components Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      @layer utilities {
        /* Toggle / switch */
        [data-scope='switch'] [data-part='track'] {
          @apply relative inline-flex h-6 w-11 cursor-pointer rounded-full bg-slate-300 transition;
        }
        [data-scope='switch'] [data-part='track'][data-state='checked'] {
          @apply bg-blue-600;
        }
        [data-scope='switch'] [data-part='thumb'] {
          @apply pointer-events-none absolute top-0.5 left-0.5 h-5 w-5 rounded-full bg-white shadow transition-all;
        }
        [data-scope='switch'] [data-part='thumb'][data-state='checked'] {
          @apply translate-x-5;
        }

        /* Progress */
        [data-scope='progress'] [data-part='track'] {
          @apply relative h-2 w-full overflow-hidden rounded-full bg-slate-200;
        }
        [data-scope='progress'] [data-part='range'] {
          @apply h-full rounded-full bg-blue-600 transition-all;
        }
        [data-scope='progress'] [data-part='range'][data-state='indeterminate'] {
          @apply w-1/3 animate-pulse;
        }

        /* Slider */
        [data-scope='slider'] [data-part='control'] {
          @apply relative h-6 w-full cursor-pointer;
        }
        [data-scope='slider'] [data-part='track'] {
          @apply absolute top-1/2 h-1.5 w-full -translate-y-1/2 rounded-full bg-slate-200;
        }
        [data-scope='slider'] [data-part='range'] {
          @apply h-full rounded-full bg-blue-600;
        }
        [data-scope='slider'] [data-part='thumb'] {
          @apply h-4 w-4 rounded-full border-2 border-blue-600 bg-white shadow focus:outline-none focus:ring-2 focus:ring-blue-500;
          top: 50%;
          transform: translate(-50%, -50%);
        }

        /* Tabs */
        [data-scope='tabs'] [data-part='list'] {
          @apply flex gap-2 border-b border-slate-200;
        }
        [data-scope='tabs'] [data-part='trigger'] {
          @apply -mb-px border-b-2 border-transparent px-3 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-900;
        }
        [data-scope='tabs'] [data-part='trigger'][data-state='active'] {
          @apply border-blue-600 text-blue-600;
        }

        /* Accordion */
        [data-scope='accordion'] [data-part='item'] {
          @apply border-b border-slate-200;
        }
        [data-scope='accordion'] [data-part='trigger'] {
          @apply flex w-full items-center justify-between py-3 text-left font-medium transition hover:text-blue-600;
        }
        [data-scope='accordion'] [data-part='content'] {
          @apply pb-3 text-sm text-slate-600;
        }

        /* Dialog + alert-dialog */
        [data-scope='dialog'] [data-part='positioner'],
        .confirm-dialog-positioner {
          @apply fixed inset-0 z-50 flex items-center justify-center p-4;
        }
        [data-scope='dialog'] [data-part='content'],
        .confirm-dialog {
          @apply relative z-10 w-full max-w-md rounded-lg bg-white p-6 shadow-xl;
        }
        [data-scope='dialog'] [data-part='title'] {
          @apply text-lg font-semibold;
        }
        [data-scope='dialog'] [data-part='description'] {
          @apply mt-2 text-sm text-slate-600;
        }
        .confirm-dialog__actions {
          @apply mt-6 flex justify-end gap-3;
        }

        /* Popover + menu + tooltip (floating) */
        [data-scope='popover'] [data-part='content'],
        [data-scope='menu'] [data-part='content'] {
          @apply min-w-[12rem] rounded-md border border-slate-200 bg-white p-2 shadow-lg focus:outline-none;
        }
        [data-scope='tooltip'] [data-part='content'] {
          @apply rounded bg-slate-900 px-2 py-1 text-xs text-white shadow;
        }
        [data-scope='menu'] [data-part='item'] {
          @apply cursor-pointer rounded px-2 py-1.5 text-sm hover:bg-slate-100;
        }
        [data-scope='menu'] [data-part='item'][data-state='highlighted'] {
          @apply bg-blue-100 text-blue-900;
        }

        /* Select */
        [data-scope='select'] [data-part='trigger'] {
          @apply flex w-full items-center justify-between rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500;
        }
        [data-scope='select'] [data-part='content'] {
          @apply max-h-60 min-w-[8rem] overflow-auto rounded-md border border-slate-200 bg-white p-1 shadow-lg focus:outline-none;
        }
        [data-scope='select'] [data-part='item'] {
          @apply cursor-pointer rounded px-2 py-1.5 text-sm;
        }
        [data-scope='select'] [data-part='item'][data-highlighted] {
          @apply bg-blue-100 text-blue-900;
        }
        [data-scope='select'] [data-part='item'][data-state='selected'] {
          @apply font-medium;
        }

        /* Toast */
        [data-scope='toast'] [data-part='region'] {
          @apply fixed bottom-4 right-4 z-50 flex w-80 flex-col gap-2;
        }
        [data-scope='toast'] [data-part='root'] {
          @apply rounded-lg bg-white p-4 shadow-lg ring-1 ring-slate-200;
        }
        [data-scope='toast'] [data-part='root'][data-type='success'] {
          @apply bg-green-50 ring-green-200;
        }
        [data-scope='toast'] [data-part='root'][data-type='error'] {
          @apply bg-red-50 ring-red-200;
        }
        [data-scope='toast'] [data-part='title'] {
          @apply text-sm font-medium;
        }
        [data-scope='toast'] [data-part='description'] {
          @apply text-xs text-slate-600;
        }

        /* Shared button */
        .btn {
          @apply inline-flex cursor-pointer items-center justify-center rounded-md px-4 py-2 text-sm font-medium transition;
        }
        .btn-primary {
          @apply bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2;
        }
        .btn-secondary {
          @apply border border-slate-300 bg-white text-slate-900 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2;
        }
        .btn-danger {
          @apply bg-red-600 text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2;
        }

        .demo-section {
          @apply rounded-lg border border-slate-200 bg-white p-6;
        }
        .demo-title {
          @apply mb-4 text-lg font-semibold text-slate-900;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="app" class="mx-auto max-w-5xl p-6"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
