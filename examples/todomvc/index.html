<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLui TodoMVC</title>
    <style>
      body { font: 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
      .todoapp { background: #fff; margin: 0 auto; max-width: 550px; box-shadow: 0 2px 4px rgba(0,0,0,.2); }
      .todoapp h1 { font-size: 80px; font-weight: 200; text-align: center; color: #b83f45; margin: 0; padding: 10px 0; }
      .new-todo { width: 100%; font-size: 24px; padding: 16px 16px 16px 60px; border: none; border-bottom: 1px solid #ededed; box-sizing: border-box; }
      .toggle-all { position: absolute; top: 0; left: -12px; width: 60px; height: 34px; opacity: 0; cursor: pointer; }
      .toggle-all + label { position: absolute; top: -8px; left: 0; width: 45px; height: 34px; text-align: center; font-size: 0; cursor: pointer; }
      .toggle-all + label:before { content: '❯'; font-size: 22px; color: #949494; padding: 6px 27px; display: block; transform: rotate(90deg); }
      .todo-list { list-style: none; margin: 0; padding: 0; }
      .todo-list li { position: relative; font-size: 24px; border-bottom: 1px solid #ededed; }
      .todo-list li label { display: block; padding: 15px 15px 15px 60px; line-height: 1.2; word-break: break-all; }
      .todo-list li .toggle { position: absolute; top: 0; bottom: 0; left: 0; width: 40px; height: auto; margin: auto 0; appearance: none; border: none; cursor: pointer; }
      .todo-list li .toggle:after { content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="-10 -18 100 135"><circle cx="50" cy="50" r="50" fill="none" stroke="%23949494" stroke-width="3"/></svg>'); }
      .todo-list li .toggle:checked:after { content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="-10 -18 100 135"><circle cx="50" cy="50" r="50" fill="none" stroke="%2359A193" stroke-width="3"/><path fill="%233EA390" d="M72 25L42 71 27 56l-4 4 20 20 34-52z"/></svg>'); }
      .todo-list li.completed label { color: #949494; text-decoration: line-through; }
      .todo-list li .destroy { display: none; position: absolute; top: 0; right: 10px; bottom: 0; margin: auto 0; width: 40px; height: 40px; font-size: 30px; color: #949494; border: none; background: none; cursor: pointer; }
      .todo-list li:hover .destroy { display: block; }
      .footer { padding: 10px 15px; height: 20px; text-align: center; font-size: 15px; border-top: 1px solid #e6e6e6; }
      .todo-count { float: left; text-align: left; }
      .filters { margin: 0; padding: 0; list-style: none; position: absolute; right: 0; left: 0; }
      .filters li { display: inline; }
      .filters li a { color: inherit; margin: 3px; padding: 3px 7px; text-decoration: none; border: 1px solid transparent; border-radius: 3px; cursor: pointer; }
      .filters li a.selected { border-color: #ce4646; }
      .clear-completed { float: right; position: relative; line-height: 19px; cursor: pointer; border: none; background: none; font-size: inherit; }
      .main { position: relative; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
